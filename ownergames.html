<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f13;
    color: white;
}

/* top bar */
.topbar {
    padding: 1rem;
    display: flex;
    justify-content: center;
    background: #141420;
    position: sticky;
    top: 0;
}

#search {
    width: 60%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}
#genreFilter {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #2a2a35;
    color: white;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
    padding: 1rem;
}

.card {
    background: #1c1c24;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card-title {
    padding: 6px;
    text-align: center;
    font-weight: bold;
}

/* buttons */
.btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
}

button {
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2a2a35;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #3a3a4a;
}

/* player */
#player {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    flex-direction: column;
    animation: fade 0.2s ease;
}

@keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
}

#bar {
    display: flex;
    gap: 8px;
    padding: 8px;
    background: #111;
}

iframe {
    flex: 1;
    border: none;
}
</style>
</head>

<body>

<div id="hub">
<div class="topbar">
    <input id="search" placeholder="Search games..." oninput="render()">

    <select id="genreFilter" onchange="render()">
        <option value="all">All Genres</option>
        <option value="Rhythm">Rhythm</option>
        <option value="Shooter">Shooter</option>
        <option value="Horror">Horror</option>
        <option value="Mystery">Mystery</option>
        <option value="Port">Port</option>
        <option value="Hub">Hub</option>
    </select>
</div>

    <div class="grid" id="grid"></div>
</div>

<div id="player">
    <div id="bar">
        <button onclick="closeGame()">Exit</button>
        <button onclick="openGameNewTab()">Open New Tab</button>
        <button onclick="goFullscreen()">Fullscreen</button>
    </div>
    <iframe id="frame"></iframe>
</div>

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const genreFilter = document.getElementById("genreFilter");

const player = document.getElementById("player");
const hub = document.getElementById("hub");
const frame = document.getElementById("frame");

let currentGame = null;

/* =========================
   CORE LOADER
========================= */

function loadGame(game) {
    if (!game) return;

    currentGame = game;

    hub.style.display = "none";
    player.style.display = "flex";

    fetch(game.url + "?t=" + Date.now())
        .then(r => r.text())
        .then(html => {
            const doc = frame.contentDocument;
            doc.open();
            doc.write(html);
            doc.close();
        });
}

/* =========================
   NEW TAB (RESPECT SETTINGS)
========================= */

function openNewTab(game) {
    if (!game || game.noNewTab) return;

    const win = window.open("about:blank", "_blank");

    fetch(game.url + "?t=" + Date.now())
        .then(r => r.text())
        .then(html => {
            win.document.open();
            win.document.write(html);
            win.document.close();
        });
}

/* wrapper */
function openGameNewTab() {
    openNewTab(currentGame);
}

/* =========================
   FULLSCREEN
========================= */

function goFullscreen() {
    if (frame.requestFullscreen) {
        frame.requestFullscreen();
    }
}

/* =========================
   EXIT
========================= */

function closeGame() {
    player.style.display = "none";
    hub.style.display = "block";

    frame.src = "about:blank";
    currentGame = null;
}

/* =========================
   RENDER (SMOOTH + CLEAN)
========================= */

function render() {
    const q = search.value.toLowerCase();

const genre = genreFilter.value;

const filtered = games.filter(g =>
    g.name.toLowerCase().includes(q) &&
    (genre === "all" || g.genre === genre)
);

    grid.innerHTML = "";

    for (const game of filtered) {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${game.cover}">
            <div class="card-title">
    ${game.name}
    <div style="font-size:12px;color:#999;">
        ${game.genre}
    </div>
</div>
            <div class="btns">
                <button>Play</button>

                ${
                    game.noNewTab
                    ? ""
                    : `<button>Open New Tab</button>`
                }
            </div>
        `;

        // main play
        div.children[2].children[0].onclick = () => loadGame(game);

        // new tab (if allowed)
        if (!game.noNewTab) {
            div.children[2].children[1].onclick = () => openNewTab(game);
        }

        grid.appendChild(div);
    }
}

/* init */
render();
</script>

</body>
</html>
