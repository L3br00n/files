<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Loader Hub</title>
    <style>
      @import url('https://fonts.cdnfonts.com/css/minecraftia');
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

      :root {
        --mc-bg: #151515;
        --mc-panel: #2a2a2a;
        --mc-panel-top: #303030;
        --mc-border-dark: #0a0a0a;
        --mc-border-light: #4b4b4b;

        --mc-green: #5dbb63;
        --mc-green-light: #7dff7d;
        --mc-green-dark: #2f6b2f;

        --mc-red: #c0392b;
        --mc-red-light: #ff6b5c;
        --mc-red-dark: #7a1f17;

        --mc-text: #e0e0e0;
        --mc-glow: rgba(109, 255, 109, 0.35);
      }

      * {
        box-sizing: border-box;
        image-rendering: pixelated;
      }

      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(circle at top, #2b2b2b, #0f0f0f),
          repeating-linear-gradient(
            rgba(255,255,255,0.02) 0px,
            rgba(255,255,255,0.02) 1px,
            transparent 1px,
            transparent 3px
          );
        color: var(--mc-text);
        font-family: 'Minecraftia', 'Press Start 2P', monospace;
      }

      /* ================= HEADERS ================= */

      h1 {
        text-align: center;
        margin: 24px 0 12px;
        font-size: 28px;
        text-shadow:
          2px 2px #000,
          0 0 10px var(--mc-glow);
      }

      h2 {
        margin: 0 0 12px;
        font-size: 15px;
        color: #9fd39f;
        text-shadow: 1px 1px #000;
      }
      h3 {
        margin: 0 0 12px;
        font-size: 13px;
        color: #ffffff;
        text-shadow: 1px 1px #000;
        text-align: center;
        text-shadow:
          2px 2px #000,
          0 0 50px var(--mc-glow);
      }

      /* ================= PANELS ================= */

      .category {
        background: linear-gradient(var(--mc-panel-top), var(--mc-panel));
        border: 3px solid var(--mc-border-dark);
        border-right-color: var(--mc-border-light);
        border-bottom-color: var(--mc-border-light);
        padding: 16px;
        margin: 18px 0;
        box-shadow:
          inset 0 0 0 2px #1a1a1a,
          0 6px 0 #0b0b0b;
      }
      .centerp {
        text-align: center
      }
      /* ================= BUTTONS ================= */

      button {
        background: linear-gradient(var(--mc-green-light), var(--mc-green));
        border: 2px solid var(--mc-border-dark);
        border-right-color: var(--mc-border-light);
        border-bottom-color: var(--mc-border-light);
        color: #0b2b0b;

        padding: 12px 14px;
        margin: 8px 0;
        width: 100%;

        font-family: inherit;
        font-size: 12px;
        cursor: pointer;

        text-shadow: 1px 1px #b6ffb6;
        box-shadow:
          inset 0 0 0 2px var(--mc-green-dark),
          0 4px 0 #0b0b0b;

        transition:
          transform 0.05s linear,
          filter 0.1s linear;
      }

      button:hover {
        filter: brightness(1.15);
      }

      button:active {
        transform: translateY(3px);
        box-shadow:
          inset 0 0 0 2px var(--mc-green-dark),
          0 1px 0 #0b0b0b;
      }

      .starred {
        background: linear-gradient(#ffe88a, #f2c200);
        border: 2px solid #a88400;
        border-right-color: #ffe08a;
        border-bottom-color: #ffe08a;
        color: #4a3b00;

        padding: 12px 14px;
        margin: 8px 0;
        width: 100%;

        font-family: inherit;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;

        text-shadow: 1px 1px #fff3c4;
        box-shadow:
          inset 0 0 0 2px #ffd24d,
          0 3px 0 #6f5600;

        transition:
          transform 0.05s linear,
          filter 0.1s linear;
      }

      .starred:hover {
        filter: brightness(1.05);
      }

      .starred:active {
        transform: translateY(2px);
        box-shadow:
          inset 0 0 0 2px #ffd24d,
          0 1px 0 #6f5600;
      }

      /* ================= PANIC BUTTON ================= */

      #panicBtn {
        background: linear-gradient(var(--mc-red-light), var(--mc-red));
        color: #2b0000;
        text-shadow: 1px 1px #ffb3b3;
        box-shadow:
          inset 0 0 0 2px var(--mc-red-dark),
          0 4px 0 #0b0b0b;
      }

      #panicBtn:hover {
        filter: brightness(1.15);
      }

      #panicBtn:active {
        transform: translateY(3px);
        box-shadow:
          inset 0 0 0 2px var(--mc-red-dark),
          0 1px 0 #0b0b0b;
      }

      /* ================= LAYOUT ================= */

      body {
        max-width: 1000px;
        margin: auto;
        padding: 14px;
      }

      /* ================= PIXEL FOCUS ================= */

      button:focus-visible {
        outline: 2px dashed #9aff9a;
        outline-offset: 3px;
      }

    </style>
