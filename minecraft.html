<button id="panicBtn" onclick='document.open();document.write("<html><body style=&quot;background:white;margin:0&quot;></body></html>");document.close();'>
PANIC BUTTON
</button>

<button id="setKey" onclick='
this.innerText="SET KEYBIND: ...";
window.awaitKey=true;
window.onkeydown=function(e){
  if(window.awaitKey){
    window.panicKey=e.key;
    document.getElementById("setKey").innerText="SET KEYBIND: "+e.key;
    window.awaitKey=false;
    window.onkeydown=function(e){
      if(e.key===window.panicKey){
        document.getElementById("panicBtn").click();
      }
    };
  }
}
'>
SET KEYBIND
</button>
